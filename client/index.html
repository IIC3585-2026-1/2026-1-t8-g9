<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra colaborativa</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <div class="toolbar">
        <input id="color-picker" type="color" value="#000000">
        <div class="color-palette">
          <button class="color-btn" data-color="#000000" style="background:#000000"></button>
          <button class="color-btn" data-color="#000000" style="background:#ffffff"></button>
          <button class="color-btn" data-color="#ff0000" style="background:#ff0000"></button>
          <button class="color-btn" data-color="#0000ff" style="background:#0000ff"></button>
          <button class="color-btn" data-color="#00aa00" style="background:#00aa00"></button>
          <button class="color-btn" data-color="#ffff00" style="background:#ffff00"></button>
          <button class="color-btn" data-color="#ff8000" style="background:#ff8000"></button>
          <button class="color-btn" data-color="#800080" style="background:#800080"></button>
        </div>
        <label for="brush-size">
          Grosor: <span id="brush-size-value">3</span>
        </label>
        <input id="brush-size" type="range" min="1" max="20" value="3">
        <button id="clear-button" type="button">Limpiar</button>
      </div>
      <canvas id="canvas" width="1100" height="700"></canvas>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
