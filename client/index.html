<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra colaborativa</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <div class="toolbar">
        <input id="color-picker" type="color" value="#000000">
        <label for="brush-size">
          Grosor: <span id="brush-size-value">3</span>
        </label>
        <input id="brush-size" type="range" min="1" max="20" value="3">
        <button id="clear-button" type="button">Limpiar</button>
      </div>
      <canvas id="canvas" width="1100" height="700"></canvas>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
